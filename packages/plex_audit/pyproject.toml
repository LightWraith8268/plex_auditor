[project]
name = "plex-audit"
version = "0.1.0"
description = "Plex Media Server library auditor — core library"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.8",
    "PyYAML>=6.0",
    "PlexAPI>=4.15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/plex_audit"]

[project.entry-points."plex_audit.checks"]
orphaned_files = "plex_audit.checks.orphaned_files:OrphanedFilesCheck"
missing_episodes = "plex_audit.checks.missing_episodes:MissingEpisodesCheck"
unmatched_items = "plex_audit.checks.unmatched_items:UnmatchedItemsCheck"
