[project]
name = "plex-audit-cli"
version = "0.1.0"
description = "Plex Media Server library auditor — CLI"
requires-python = ">=3.11"
dependencies = [
    "plex-audit",
    "typer>=0.12",
]

[project.scripts]
plex-audit = "plex_audit_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/plex_audit_cli"]
