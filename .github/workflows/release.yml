name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  bump:
    name: Determine and apply version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_MERGE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Skip if last commit is a release commit
        id: skipcheck
        run: |
          msg=$(git log -1 --pretty=%s)
          if [[ "$msg" == chore\(release\)* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine new version
        id: bump
        if: steps.skipcheck.outputs.skip != 'true'
        run: |
          uv sync --all-packages
          NEW=$(uv run python tools/bump_version.py)
          if [ -z "$NEW" ]; then
            echo "No bump needed."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Update changelog
        if: steps.bump.outputs.bumped == 'true'
        run: |
          uv run python tools/update_changelog.py --version "${{ steps.bump.outputs.version }}"

      - name: Commit, tag, push
        if: steps.bump.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/ CHANGELOG.md
          git commit -m "chore(release): v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin main
          git push origin "v$VERSION"

  github_release:
    name: Create GitHub Release
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}
          fetch-depth: 0

      - name: Extract changelog section
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          awk -v v="$VERSION" '
            BEGIN { printing=0 }
            $0 ~ "^## \\[" v "\\]" { printing=1; next }
            printing && /^## \[/ { exit }
            printing { print }
          ' CHANGELOG.md > release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          name: v${{ needs.bump.outputs.version }}
          body_path: release_body.md

  pypi:
    name: Publish to PyPI
    needs: [bump, github_release]
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist and wheel
        working-directory: packages/plex_audit
        run: uv build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/plex_audit/dist

  binaries:
    name: Build binary (${{ matrix.asset_name }})
    needs: [bump, github_release]
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: plex-audit-linux-x64
          - os: macos-latest
            asset_name: plex-audit-macos-arm64
          - os: macos-13
            asset_name: plex-audit-macos-x64
          - os: windows-latest
            asset_name: plex-audit-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install workspace and PyInstaller
        run: |
          uv sync --all-packages
          uv pip install pyinstaller

      - name: Build binary
        shell: bash
        run: |
          uv run pyinstaller --onefile --name "${{ matrix.asset_name }}" \
            --collect-all plex_audit \
            packages/plex_audit/src/plex_audit/cli/main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          files: dist/${{ matrix.asset_name }}*

  docker:
    name: Build and push Docker image
    needs: [bump, github_release]
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plex_auditor:${{ needs.bump.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/plex_auditor:latest
